{% macro cta_button(url, label) -%}
<a href="{{ url }}" style="display:inline-block;background-color:#D97757;color:#ffffff;padding:12px 24px;border-radius:10px;font-weight:600;font-size:15px;text-decoration:none;font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">{{ label }}</a>
{%- endmacro %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>{% block title %}Sarathi{% endblock %}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#fafaf9;font-family:'Geist',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#1c1917;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#fafaf9;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background-color:#ffffff;border-radius:16px;border:1px solid #e7e5e4;">
            <tr>
              <td style="padding:28px 32px 0 32px;">
                <table role="presentation" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                  <tr>
                    <td style="padding-right:10px;vertical-align:middle;">
                      <img src="https://sarathi.niheshr.com/apple-icon" width="36" height="36" alt="Sarathi" style="display:block;border-radius:8px;">
                    </td>
                    <td style="vertical-align:middle;">
                      <span style="font-size:20px;font-weight:700;letter-spacing:-0.01em;color:#1c1917;">Sarathi</span>
                    </td>
                  </tr>
                </table>
                <div style="margin-top:16px;height:3px;width:48px;background-color:#D97757;border-radius:2px;font-size:1px;line-height:1px;"></div>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 32px 32px 32px;font-size:15px;line-height:1.6;color:#292524;">
                {% block content %}{% endblock %}
              </td>
            </tr>
          </table>
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">
            <tr>
              <td style="padding:20px 12px;text-align:center;font-size:12px;color:#78716c;">
                {% block footer %}Sarathi - your agentic relationship manager. This is an automated message; please don't reply.{% endblock %}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
