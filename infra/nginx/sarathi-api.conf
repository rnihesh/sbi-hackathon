# sarathi-api.niheshr.com -> FastAPI on 127.0.0.1:8100
# HTTP only; certbot --nginx adds the TLS server block and redirect.
# SSE endpoints (chat stream, console feed) need buffering OFF and long
# read timeouts or nginx silently kills the stream.
server {
    listen 80;
    listen [::]:80;
    server_name sarathi-api.niheshr.com;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE: never buffer, never time out mid-stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
